<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demoguesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --blue-mid: #85B7EB;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --red-mid: #F09595;
  --green-light: #EAF3DE;
  --green: #3B6D11;
  --gray-50: #F8F7F4;
  --gray-100: #EEECEA;
  --gray-200: #D8D6D2;
  --gray-400: #9B9893;
  --gray-700: #484642;
  --gray-900: #1C1B19;
  --text: #1C1B19;
  --text-muted: #6B6966;
  --text-hint: #9B9893;
  --border: rgba(0,0,0,0.1);
  --border-strong: rgba(0,0,0,0.18);
  --surface: #FFFFFF;
  --bg: #F3F1EE;
  --radius: 10px;
  --radius-lg: 14px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
  font-size: 15px;
  line-height: 1.5;
}

.page-header {
  text-align: center;
  margin-bottom: 2.5rem;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-hint);
  font-weight: 500;
  margin-bottom: 10px;
}

h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 400;
  line-height: 1.15;
  color: var(--gray-900);
  margin-bottom: 10px;
}

h1 em {
  font-style: italic;
  color: var(--blue);
}

.sub {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 300;
  max-width: 420px;
  margin: 0 auto;
}

.game-container {
  max-width: 580px;
  margin: 0 auto;
}

.score-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 1.5rem;
}

.score-pill {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
}

.score-pill .slabel {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-hint);
  font-weight: 500;
  margin-bottom: 3px;
}

.score-pill .sval {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.round-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.round-num {
  font-size: 12px;
  color: var(--text-hint);
  font-weight: 500;
}

.progress-bar {
  height: 3px;
  background: var(--gray-100);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 1rem;
}

.progress-fill {
  height: 100%;
  background: var(--gray-700);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 12px;
}

.place-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--gray-900);
  line-height: 1.2;
  margin-bottom: 3px;
}

.place-state {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  font-weight: 300;
}

.blurb-wrap {
  margin-bottom: 1rem;
  min-height: 44px;
}

.blurb-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  font-weight: 300;
  font-style: italic;
  border-left: 2px solid var(--gray-200);
  padding-left: 10px;
}

.blurb-loading {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 0 6px;
}

.blurb-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gray-300, #c8c6c2);
  animation: blink 1.2s infinite;
}
.blurb-dot:nth-child(2) { animation-delay: 0.2s; }
.blurb-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.25; }
  40% { opacity: 1; }
}


.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat {
  background: var(--gray-50);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.stat.wide { grid-column: span 2; }

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-hint);
  font-weight: 500;
  margin-bottom: 4px;
}

.stat-val {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}

.race-bar-wrap { margin-top: 6px; }

.race-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 12px;
}

.race-name {
  width: 78px;
  flex-shrink: 0;
  color: var(--text-muted);
}

.race-track {
  flex: 1;
  height: 7px;
  background: var(--gray-200);
  border-radius: 4px;
  overflow: hidden;
}

.race-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--gray-700);
  transition: width 0.5s ease;
}

.race-pct {
  width: 32px;
  text-align: right;
  color: var(--text-muted);
  flex-shrink: 0;
}

.margin-section {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  margin-bottom: 12px;
}

.margin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.margin-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

.margin-val {
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--gray-900);
  cursor: pointer;
  border: 3px solid var(--surface);
  box-shadow: 0 0 0 1px var(--border-strong);
}

input[type=range]::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--gray-900);
  cursor: pointer;
  border: 3px solid var(--surface);
  box-shadow: 0 0 0 1px var(--border-strong);
}

.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.choice-btn {
  padding: 16px 10px;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--border-strong);
  background: var(--surface);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: all 0.12s;
  text-align: center;
  line-height: 1.3;
}

.choice-btn .party-label {
  display: block;
  font-size: 11px;
  font-weight: 400;
  opacity: 0.65;
  margin-top: 2px;
}

.choice-btn:hover:not(:disabled) {
  background: var(--gray-50);
  border-color: var(--gray-400);
  transform: translateY(-1px);
}

.choice-btn:active:not(:disabled) { transform: translateY(0); }

.choice-btn.harris { border-color: #B5D4F4; color: var(--blue); }
.choice-btn.trump  { border-color: #F7C1C1; color: var(--red); }
.choice-btn.harris:hover:not(:disabled) { background: var(--blue-light); border-color: var(--blue-mid); }
.choice-btn.trump:hover:not(:disabled)  { background: var(--red-light); border-color: var(--red-mid); }

.choice-btn.correct-h { background: var(--blue); color: #fff; border-color: var(--blue); }
.choice-btn.correct-t { background: var(--red);  color: #fff; border-color: var(--red); }
.choice-btn.wrong-h, .choice-btn.wrong-t { opacity: 0.35; }
.choice-btn:disabled { cursor: default; transform: none; }

.result-box {
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 0.5px solid;
}

.result-box.correct {
  background: var(--green-light);
  border-color: #C0DD97;
  color: var(--green);
}

.result-box.wrong {
  background: var(--red-light);
  border-color: var(--red-mid);
  color: var(--red);
}

.result-headline {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 4px;
}

.result-detail {
  font-size: 13px;
  opacity: 0.8;
  line-height: 1.5;
}

.next-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-lg);
  border: 0.5px solid var(--border-strong);
  background: var(--gray-900);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.12s, transform 0.12s;
}

.next-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.next-btn:active { transform: translateY(0); }

.hint-text {
  text-align: center;
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 8px;
}

.final-wrap {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  text-align: center;
}

.final-grade {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 72px;
  font-weight: 400;
  line-height: 1;
  color: var(--gray-900);
  margin: 12px 0;
}

.final-score {
  font-size: 28px;
  font-weight: 500;
  color: var(--gray-900);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}

.final-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.final-comment {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 340px;
  margin: 0 auto 1.5rem;
  font-weight: 300;
  line-height: 1.6;
}

.replay-btn {
  padding: 13px 32px;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--border-strong);
  background: var(--surface);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s, transform 0.12s;
}

.replay-btn:hover { background: var(--gray-50); transform: translateY(-1px); }

@media (max-width: 480px) {
  body { padding: 1.5rem 0.75rem 3rem; }
  h1 { font-size: 26px; }
  .stats-grid { grid-template-columns: 1fr; }
  .stat.wide { grid-column: span 1; }
}
</style>
</head>
<body>

  </div>
  <div class="round-meta">

</main>

  { name: "Minnehaha County", state: "South Dakota", pop: 200410, medIncome: 64000, perCapita: 38000, white: 79, black: 7, hispanic: 5, asian: 4, other: 5, college: 36, urban: 85, sqMiles: 808, winner: "trump", margin: 18, notes: "Sioux Falls; South Dakota's largest city, still leans Republican" },
];


let pool = [], current = null, roundNum = 0;
const TOTAL = 12;
let score = 0, correctCount = 0, streak = 0, bestStreak = 0;
let answered = false, guessedMargin = 10;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startGame() {
  pool = shuffle(counties).slice(0, TOTAL);
  score = 0; correctCount = 0; streak = 0; bestStreak = 0; roundNum = 0;
  updateScoreBar();
  document.getElementById('progress').style.width = '0%';
  nextRound();
}

function updateScoreBar() {
  document.getElementById('score').textContent = score;
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('streak').textContent = bestStreak;
}

function nextRound() {
  if (roundNum >= TOTAL) { showFinal(); return; }
  current = pool[roundNum];
  answered = false;
  guessedMargin = 10;
  document.getElementById('round-label').textContent = `Round ${roundNum + 1} of ${TOTAL}`;
  document.getElementById('progress').style.width = `${(roundNum / TOTAL) * 100}%`;
  renderRound();
}

function renderRound() {
  const c = current;
  const races = [
    { name: "White", pct: c.white },
    { name: "Hispanic", pct: c.hispanic },
    { name: "Black", pct: c.black },
    { name: "Asian", pct: c.asian },
    { name: "Other", pct: c.other },
  ].filter(r => r.pct > 0).sort((a,b) => b.pct - a.pct);

  const raceRows = races.map(r => `
    <div class="race-row">
      <span class="race-name">${r.name}</span>
      <div class="race-track"><div class="race-fill" style="width:${r.pct}%"></div></div>
      <span class="race-pct">${r.pct}%</span>
    </div>`).join('');

  document.getElementById('game-area').innerHTML = `
    <div class="card">
      <div class="place-name">${c.name}</div>
      <div class="place-state">${c.state}</div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-label">Population</div>
          <div class="stat-val">${c.pop.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Urban</div>
          <div class="stat-val">${c.urban}%</div>
        </div>
        <div class="stat">
          <div class="stat-label">Median household income</div>
          <div class="stat-val">$${c.medIncome.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Per capita income</div>
          <div class="stat-val">$${c.perCapita.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="stat-label">College educated</div>
          <div class="stat-val">${c.college}%</div>
        </div>
        <div class="stat">
          <div class="stat-label">Land area</div>
          <div class="stat-val">${c.sqMiles.toLocaleString()} mi²</div>
        </div>
        <div class="stat wide">
          <div class="stat-label">Racial composition</div>
          <div class="race-bar-wrap">${raceRows}</div>
        </div>
      </div>
    </div>

    <div class="margin-section">
      <div class="margin-header">
        <span class="margin-label">Estimated winning margin</span>
        <span class="margin-val" id="margin-disp">10 pts</span>
      </div>
      <input type="range" min="1" max="85" value="10" step="1" id="margin-slider">
    </div>

    <div class="choices">
      <button class="choice-btn harris" id="btn-harris" onclick="guess('harris')">
        Kamala Harris
        <span class="party-label">Democrat</span>
      </button>
      <button class="choice-btn trump" id="btn-trump" onclick="guess('trump')">
        Donald Trump
        <span class="party-label">Republican</span>
      </button>
    </div>
    <div id="result-area"></div>
    <p class="hint-text">Pick the winner — bonus points for a close margin estimate</p>
  `;

  document.getElementById('margin-slider').addEventListener('input', function() {
    guessedMargin = parseInt(this.value);
    document.getElementById('margin-disp').textContent = `${guessedMargin} pts`;
  });

  fetchBlurb(c);
}

async function fetchBlurb(c) {
  const prompt = `Write exactly 3 sentences describing ${c.name}, ${c.state} as a place — its landscape, economy, and the feel of everyday life there. Be specific and vivid. Do not mention politics, elections, parties, or voting. Do not quote census statistics directly.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 160,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || "").join("").trim();
    const loadingEl = document.getElementById('blurb-loading');
    const textEl = document.getElementById('blurb-text');
    if (text && loadingEl && textEl) {
      loadingEl.style.display = 'none';
      textEl.textContent = text;
      textEl.style.display = 'block';
    }
  } catch(e) {
    const loadingEl = document.getElementById('blurb-loading');
    if (loadingEl) loadingEl.style.display = 'none';
  }
}

function guess(winner) {
  if (answered) return;
  answered = true;

  const bh = document.getElementById('btn-harris');
  const bt = document.getElementById('btn-trump');
  bh.disabled = true; bt.disabled = true;

  const correct = winner === current.winner;
  const marginDiff = Math.abs(guessedMargin - current.margin);
  let marginPts = marginDiff <= 3 ? 3 : marginDiff <= 8 ? 2 : marginDiff <= 15 ? 1 : 0;
  let roundScore = 0;

  if (correct) {
    roundScore = 5 + marginPts;
    correctCount++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    if (streak >= 3) roundScore += 2;
  } else {
    streak = 0;
  }
  score += roundScore;
  updateScoreBar();

  if (correct) {
    if (winner === 'harris') bh.className = 'choice-btn correct-h';
    else bt.className = 'choice-btn correct-t';
  } else {
    if (winner === 'harris') { bh.className = 'choice-btn wrong-h'; bt.className = 'choice-btn correct-t'; }
    else { bt.className = 'choice-btn wrong-t'; bh.className = 'choice-btn correct-h'; }
  }

  const winnerName = current.winner === 'harris' ? 'Harris (D)' : 'Trump (R)';
  const streakNote = streak >= 3 && correct ? ' · +2 streak bonus!' : '';
  const marginNote = marginDiff === 0 ? 'Perfect margin call!' : marginDiff <= 3 ? `Margin within 3 pts (+3)` : marginDiff <= 8 ? `Margin within 8 pts (+2)` : marginDiff <= 15 ? `Margin within 15 pts (+1)` : `Actual margin: ${current.margin} pts`;

  document.getElementById('result-area').innerHTML = `
    <div class="result-box ${correct ? 'correct' : 'wrong'}">
      <div class="result-headline">${correct ? '✓ Correct!' : '✗ Wrong.'} ${winnerName} won by ${current.margin} pts. +${roundScore} pts${streakNote}</div>
      <div class="result-detail">${current.notes}. ${marginNote}.</div>
    </div>
    <button class="next-btn" onclick="advance()">${roundNum + 1 < TOTAL ? 'Next county →' : 'See final score →'}</button>
  `;
  roundNum++;
}

function advance() {
  nextRound();
}

function showFinal() {
  document.getElementById('round-label').textContent = 'Game over';
  document.getElementById('progress').style.width = '100%';
  const maxScore = TOTAL * 10;
  const pct = score / maxScore;
  let grade, comment;
  if (pct >= 0.85) { grade = 'A'; comment = 'Psephologist-level intuition. You read the demographic tea leaves like a seasoned analyst.'; }
  else if (pct >= 0.70) { grade = 'B'; comment = 'Strong showing. You understand the broad patterns that drove the 2024 result.'; }
  else if (pct >= 0.55) { grade = 'C'; comment = 'Solid — but American political geography is full of surprises. 2024 especially.'; }
  else if (pct >= 0.40) { grade = 'D'; comment = 'The income, education, and race story is more complicated than it looks. Keep digging.'; }
  else { grade = 'F'; comment = "Demographics aren't destiny — 2024 proved it in a big way. Review the results and try again."; }

  document.getElementById('game-area').innerHTML = `
    <div class="final-wrap">
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-hint);font-weight:500;margin-bottom:6px;">Final score</div>
      <div class="final-grade">${grade}</div>
      <div class="final-score">${score} / ${maxScore} pts</div>
      <div class="final-sub">${correctCount} of ${TOTAL} counties correct &middot; Best streak: ${bestStreak}</div>
      <div class="final-comment">${comment}</div>
      <button class="replay-btn" onclick="startGame()">Play again</button>
    </div>
  `;
}

startGame();
</script>
</body>
</html>
